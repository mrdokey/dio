<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bursa Properti Bali</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --primary: #1e40af; --secondary: #1e293b; --accent: #25d366; --bg: #f1f5f9; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #334155; }
        .login-overlay { position: fixed; inset: 0; background: var(--secondary); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .login-box { background: white; width: 100%; max-width: 350px; padding: 40px 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; }
        .nav-admin { background: var(--secondary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        
        /* Dashboard Stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .stat-card h4 { margin: 0; font-size: 10px; color: #64748b; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: 800; }

        .card-table { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .table-header { padding: 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; text-align: left; padding: 15px; font-size: 11px; text-transform: uppercase; color: #64748b; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        .img-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; border: 1px solid #e2e8f0; }
        .input-style { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 10px 18px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; font-size: 14px; padding: 15px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-edit { background: #fef9c3; color: #854d0e; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 650px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .badge-tersedia { background: #dcfce7; color: #166534; }
        .badge-terjual { background: #fee2e2; color: #991b1b; }
        .badge-tersewa { background: #fef9c3; color: #854d0e; }
        
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="adminSystem()">

    <div class="login-overlay" x-show="!isLoggedIn" x-cloak>
        <div class="login-box">
            <h2 style="margin: 0 0 10px; color: var(--primary);">Admin Login</h2>
            <input type="text" class="input-style" placeholder="Username" x-model="loginUser">
            <input type="password" class="input-style" placeholder="Password" x-model="loginPass">
            <button @click="doLogin" class="btn btn-primary">Masuk</button>
            <p x-show="errorMsg" x-text="errorMsg" style="color: var(--danger); font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <template x-if="isLoggedIn">
        <div>
            <nav class="nav-admin">
                <div style="font-weight: 800;">BURSA PROPERTI BALI</div>
                <button @click="doLogout" style="background: rgba(255,255,255,0.1); color: white; padding: 5px 12px; border-radius: 6px; font-size: 10px; cursor:pointer;">Keluar</button>
            </nav>

            <div class="container">
                <div class="stats">
                    <div class="stat-card"><h4>TOTAL UNIT</h4><p x-text="properties.length">0</p></div>
                    <div class="stat-card" style="border-left-color: var(--accent);"><h4>TERSEDIA</h4><p x-text="countStatus('Tersedia')">0</p></div>
                    <div class="stat-card" style="border-left-color: var(--danger);"><h4>TERJUAL</h4><p x-text="countStatus('Terjual')">0</p></div>
                    <div class="stat-card" style="border-left-color: var(--warning);"><h4>TERSEWA</h4><p x-text="countStatus('Tersewa')">0</p></div>
                </div>

                <div class="card-table">
                    <div class="table-header">
                        <h3 style="margin:0; font-size: 16px;">Manajemen Database</h3>
                        <button @click="openAddModal" class="btn btn-add">+ Tambah Properti</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table x-show="!loading" x-cloak>
                            <thead>
                                <tr><th>Unit</th><th>Kategori</th><th>Harga</th><th>Status</th><th style="text-align: right;">Opsi</th></tr>
                            </thead>
                            <tbody>
                                <template x-for="p in properties" :key="p.rowId">
                                    <tr>
                                        <td style="display: flex; gap: 10px; align-items: center;">
                                            <img :src="p.Foto_Utama" class="img-preview" onerror="this.src='https://placehold.co/100x100?text=No+Photo'">
                                            <div>
                                                <div style="font-weight: 700;" x-text="p.Nama_Properti"></div>
                                                <div style="font-size: 10px; color: #94a3b8;" x-text="p.Lokasi"></div>
                                            </div>
                                        </td>
                                        <td x-text="p.Kategori"></td>
                                        <td style="font-weight: 800; color: var(--primary);">Rp <span x-text="formatRupiah(p.Harga)"></span></td>
                                        <td>
                                            <span :class="'badge badge-' + p.Status.toLowerCase()" x-text="p.Status"></span>
                                        </td>
                                        <td style="text-align: right;">
                                            <button @click="openEditModal(p)" class="btn btn-edit">Edit</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                        <div x-show="loading" style="padding: 50px; text-align: center;">Menyinkronkan data...</div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <div class="modal-overlay" x-show="showModal" x-cloak>
        <div class="modal-content">
            <h3 x-text="isEdit ? 'Update Properti' : 'Tambah Baru'" style="margin-top:0; color: var(--primary);"></h3>
            <form @submit.prevent="saveData">
                <label>Nama Properti</label>
                <input type="text" class="input-style" x-model="formData.Nama_Properti" required>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div>
                        <label>Kategori</label>
                        <select class="input-style" x-model="formData.Kategori">
                            <option value="Rumah Baru">Rumah Baru</option>
                            <option value="Rumah Bekas">Rumah Bekas</option>
                            <option value="Tanah Jual">Tanah Jual</option>
                            <option value="Tanah Sewa">Tanah Sewa</option>
                        </select>
                    </div>
                    <div>
                        <label>Harga (Hanya Angka)</label>
                        <input type="number" class="input-style" x-model="formData.Harga" required>
                    </div>
                </div>

                <label>Lokasi</label>
                <input type="text" class="input-style" x-model="formData.Lokasi" required>

                <label>Deskripsi Singkat</label>
                <textarea class="input-style" x-model="formData.Deskripsi" rows="2"></textarea>

                <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed #cbd5e1;">
                    <label style="color: var(--primary); margin-bottom: 10px;">Link Foto Properti (URL)</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label>Link Foto Utama</label>
                            <input type="text" class="input-style" placeholder="https://..." x-model="formData.Foto_Utama">
                        </div>
                        <div>
                            <label>Link Foto 2</label>
                            <input type="text" class="input-style" placeholder="https://..." x-model="formData.Foto_2">
                        </div>
                        <div>
                            <label>Link Foto 3</label>
                            <input type="text" class="input-style" placeholder="https://..." x-model="formData.Foto_3">
                        </div>
                        <div>
                            <label>Link Foto 4</label>
                            <input type="text" class="input-style" placeholder="https://..." x-model="formData.Foto_4">
                        </div>
                    </div>
                    <p style="font-size: 9px; color: #64748b; margin: 5px 0 0;">*Masukkan link gambar langsung (contoh: dari ImgBB 'Direct Link')</p>
                </div>

                <label>Status</label>
                <select class="input-style" x-model="formData.Status">
                    <option value="Tersedia">Tersedia</option>
                    <option value="Terjual">Terjual</option>
                    <option value="Tersewa">Tersewa</option>
                </select>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-add" style="flex: 2; padding: 15px;" x-text="processing ? 'Menyimpan...' : 'Simpan ke Database'"></button>
                    <button type="button" @click="showModal = false" class="btn" style="flex: 1; background: #eee;">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyCd3-nBkeA8gGFy1TCqY5xuz2hwcbswp2fDnK_F8ZIbiVNbdBguAz2EnyYxCvfn-MVkg/exec';

        function adminSystem() {
            return {
                isLoggedIn: localStorage.getItem('admin_login') === 'true',
                loginUser: '', loginPass: '', errorMsg: '',
                properties: [], loading: false, showModal: false,
                isEdit: false, processing: false, formData: {},

                formatRupiah(val) {
                    if (!val) return '0';
                    return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                },

                countStatus(stat) {
                    return this.properties.filter(p => p.Status === stat).length;
                },

                doLogin() {
                    if (this.loginUser === 'mrd' && this.loginPass === 'Sukses1234#') {
                        this.isLoggedIn = true;
                        localStorage.setItem('admin_login', 'true');
                        this.fetchData();
                    } else { this.errorMsg = 'Username/Password salah!'; }
                },
                doLogout() { this.isLoggedIn = false; localStorage.removeItem('admin_login'); },
                init() { if(this.isLoggedIn) this.fetchData(); },
                async fetchData() {
                    this.loading = true;
                    try { 
                        const res = await fetch(API_URL); 
                        this.properties = await res.json();
                    } catch (e) { console.error(e); }
                    this.loading = false;
                },
                openAddModal() {
                    this.isEdit = false;
                    this.formData = { Nama_Properti: '', Kategori: 'Rumah Baru', Harga: '', Lokasi: '', Deskripsi: '', Foto_Utama: '', Foto_2: '', Foto_3: '', Foto_4: '', Status: 'Tersedia' };
                    this.showModal = true;
                },
                openEditModal(item) { this.isEdit = true; this.formData = { ...item }; this.showModal = true; },
                async saveData() {
                    this.processing = true;
                    const payload = {
                        ...this.formData,
                        "Nama Properti": this.formData.Nama_Properti,
                        "Foto Utama": this.formData.Foto_Utama,
                        "Foto 2": this.formData.Foto_2,
                        "Foto 3": this.formData.Foto_3,
                        "Foto 4": this.formData.Foto_4
                    };
                    try {
                        await fetch(API_URL, { 
                            method: 'POST', 
                            mode: 'no-cors', 
                            body: JSON.stringify(payload) 
                        });
                        this.showModal = false;
                        setTimeout(() => this.fetchData(), 2000);
                    } catch (e) { alert('Gagal!'); }
                    this.processing = false;
                }
            }
        }
    </script>
</body>
    </html>
