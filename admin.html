<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin - Bursa Properti Bali</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .login-box { max-width: 300px; margin: 100px auto; background: white; padding: 20px; border-radius: 10px; text-align: center; }
        #panel { display: none; max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .btn-add { background: #27ae60; color: white; text-decoration: none; padding: 10px; border-radius: 5px; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="login-form" class="login-box">
        <h3>Login Admin</h3>
        <input type="text" id="user" placeholder="User" style="width:90%;margin-bottom:10px;"><br>
        <input type="password" id="pass" placeholder="Pass" style="width:90%;margin-bottom:10px;"><br>
        <button onclick="login()" style="width:95%;">Masuk</button>
    </div>
    <div id="panel">
        <a href="inputdata.html" class="btn-add">+ Tambah Properti</a>
        <button onclick="sessionStorage.clear();location.reload();">Logout</button>
        <table id="table"><thead><tr><th>Nama</th><th>Harga</th><th>Aksi</th></tr></thead><tbody id="res"></tbody></table>
    </div>
    <script>
        const TOKEN = 'PatCUXnMxIjwXWFPN.93d8a295c5ff8fcd2f79bc558699dc9c2b3d203ecb981320a19ab52d60012806';
        const BASE_ID = 'appdyjcsoUhdZQbt6';
        if(sessionStorage.getItem('log')==='1') show();
        function login(){
            if(document.getElementById('user').value==='mrd' && document.getElementById('pass').value==='Sukses1234#'){
                sessionStorage.setItem('log','1'); show();
            } else { alert('Salah!'); }
        }
        function show(){
            document.getElementById('login-form').style.display='none';
            document.getElementById('panel').style.display='block';
            fetchData();
        }
        async function fetchData(){
            const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/Bursa%20Properti%20Bali`, {
                headers: { Authorization: `Bearer ${TOKEN}` }
            });
            const data = await res.json();
            const body = document.getElementById('res'); body.innerHTML = '';
            data.records.forEach(r => {
                body.innerHTML += `<tr><td>${r.fields['Nama Properti']}</td><td>${r.fields['Harga']}</td><td><button onclick="hapus('${r.id}')">Hapus</button></td></tr>`;
            });
        }
        async function hapus(id){
            if(confirm('Hapus?')){
                await fetch(`https://api.airtable.com/v0/${BASE_ID}/Bursa%20Properti%20Bali/${id}`, {
                    method: 'DELETE', headers: { Authorization: `Bearer ${TOKEN}` }
                });
                fetchData();
            }
        }
    </script>
</body>
</html>
